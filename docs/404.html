<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
        // This script takes the "not found" path and redirects it to the index
        // but keeps the path so Blazor's Router can pick it up.
        var path = window.location.pathname;
        if (path.startsWith('/FeatureTooltip/')) {
            window.location.replace('/FeatureTooltip/?path=' + encodeURIComponent(path.substring(16)));
        } else {
            window.location.replace('/?path=' + encodeURIComponent(path));
        }
    </script>
</head>
<body></body>
</html>
