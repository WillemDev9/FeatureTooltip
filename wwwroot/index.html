    <script>
        // This script automatically redirects clean paths to hash paths
        // ONLY when hosted on GitHub Pages (or when the path starts with /FeatureTooltip/)
        if (window.location.pathname.includes('/FeatureTooltip/') && !window.location.hash) {
            var path = window.location.pathname.replace('/FeatureTooltip/', '');
            if (path && path !== "") {
                window.location.replace('/FeatureTooltip/#' + path);
            }
        }
    </script>
